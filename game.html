<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#20424E">
<title>A OCCHIO! — Prototipo</title>
<style>
  /* ===========================================================
     A OCCHIO!  —  prototipo party game (single file, no deps)
     Palette: crema, blu petrolio, verde acqua, corallo, ocra
     =========================================================== */
  :root{
    --cream:#F5ECD6;
    --paper:#FBF6E7;
    --paper-2:#FFFDF6;
    --ink:#20424E;       /* blu petrolio scuro */
    --petrol:#2E6B7A;
    --teal:#48A39A;      /* verde acqua */
    --coral:#E0795E;
    --ochre:#E6AC3C;
    --olive:#8FA94E;
    --plum:#9A6A8E;
    --line:rgba(32,66,78,.16);
    --line-soft:rgba(32,66,78,.08);
    --shadow:0 10px 24px -14px rgba(32,66,78,.55);
    --shadow-lg:0 18px 40px -18px rgba(32,66,78,.6);
    --radius:20px;
    --radius-sm:13px;
    --serif:Georgia,"Times New Roman",serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--sans);
    color:var(--ink);
    background:
      radial-gradient(120% 80% at 50% -10%, #FBF4DF 0%, var(--cream) 55%, #EFE3C6 100%);
    min-height:100dvh;
    -webkit-font-smoothing:antialiased;
    line-height:1.45;
  }
  .wrap{
    max-width:540px;
    margin:0 auto;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    padding:0 14px env(safe-area-inset-bottom);
  }

  /* ---------- header ---------- */
  header{
    position:sticky;top:0;z-index:30;
    padding:12px 0 10px;
    background:linear-gradient(180deg, var(--cream) 70%, rgba(245,236,214,0));
  }
  .header-top{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .menu-btn{flex:0 0 auto;width:42px;height:42px;border-radius:12px;border:1.5px solid var(--line);
    background:var(--paper-2);color:var(--ink);font-size:24px;font-weight:900;line-height:1;
    display:grid;place-items:center;box-shadow:var(--shadow);}
  .menu-btn:active{transform:translateY(1px);}
  .menu-btn[hidden]{display:none;}
  .menu-sheet{position:absolute;right:0;top:56px;z-index:45;min-width:210px;
    background:var(--paper-2);border:1.5px solid var(--line);border-radius:14px;box-shadow:var(--shadow-lg);padding:6px;}
  .menu-sheet[hidden]{display:none;}
  .menu-item{display:block;width:100%;text-align:left;background:transparent;border:none;
    padding:12px 12px;border-radius:10px;font-size:14.5px;font-weight:700;color:var(--ink);font-family:inherit;}
  .menu-item:active{background:var(--line-soft);}
  .menu-item + .menu-item{margin-top:2px;border-top:1px dashed var(--line-soft);}
  .confirm-ov{position:fixed;inset:0;z-index:90;background:rgba(32,66,78,.45);
    display:flex;align-items:center;justify-content:center;padding:24px;animation:fadeUp .15s ease;}
  .confirm-card{background:var(--paper);border:1.5px solid var(--line);border-radius:18px;
    padding:20px;width:100%;max-width:360px;box-shadow:var(--shadow-lg);}
  .confirm-msg{font-size:15px;font-weight:700;color:var(--ink);line-height:1.45;margin-bottom:16px;}
  .brand{display:flex;align-items:center;gap:10px;min-width:0;}
  .eye{
    width:38px;height:38px;border-radius:50%;
    background:var(--paper-2);
    border:2.5px solid var(--ink);
    display:grid;place-items:center;flex:0 0 auto;
    box-shadow:var(--shadow);
    position:relative;
  }
  .eye::before{content:"";width:15px;height:15px;border-radius:50%;
    background:radial-gradient(circle at 38% 35%, #5fb6c2 0 30%, var(--petrol) 55%, var(--ink) 100%);
    box-shadow:0 0 0 3px var(--paper-2), inset 0 0 0 4px #fff3;}
  .eye::after{content:"";position:absolute;width:5px;height:5px;border-radius:50%;background:#fff;top:11px;left:11px;}
  .brand h1{
    font-family:var(--sans);
    font-weight:900;
    font-size:26px;
    letter-spacing:-1px;
    margin:0;line-height:.95;
    color:var(--ink);
    text-shadow:1.5px 1.5px 0 rgba(224,121,94,.28);
  }
  .brand h1 small{display:block;font-size:10.5px;font-weight:700;letter-spacing:.5px;color:var(--petrol);text-shadow:none;text-transform:uppercase;margin-top:2px;}

  .statusbar{
    display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;
  }
  .pill{
    font-size:11px;font-weight:800;letter-spacing:.3px;
    background:var(--paper);border:1.5px solid var(--line);
    padding:5px 10px;border-radius:999px;color:var(--ink);
    display:inline-flex;align-items:center;gap:5px;
  }
  .pill.live{background:var(--ink);color:var(--paper);border-color:var(--ink);}
  .pill.fen{background:var(--ochre);border-color:#caa02f;color:#3a2c06;}

  main{flex:1;padding-bottom:24px;}

  /* ---------- cards ---------- */
  .card{
    background:var(--paper);
    border:1.5px solid var(--line);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:16px;
    margin:12px 0;
  }
  .card.flat{box-shadow:none;}
  .card h2{
    font-size:15px;font-weight:900;letter-spacing:.2px;margin:0 0 4px;text-transform:uppercase;
    display:flex;align-items:center;gap:8px;
  }
  .card h2 .tick{font-size:13px;}
  .sub{font-size:13px;color:#4a6c75;margin:0 0 12px;}
  .tagline{font-family:var(--serif);font-style:italic;font-size:14.5px;color:var(--petrol);}

  .eyebrow{
    font-size:10.5px;font-weight:900;letter-spacing:1.4px;text-transform:uppercase;
    color:var(--coral);margin:0 0 6px;
  }

  /* ---------- buttons ---------- */
  button{font-family:inherit;cursor:pointer;}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    width:100%;
    background:var(--ink);color:var(--paper);
    border:none;border-radius:14px;
    padding:15px 18px;
    font-size:15.5px;font-weight:800;letter-spacing:.2px;
    box-shadow:var(--shadow);
    transition:transform .08s ease, filter .15s ease;
  }
  .btn:active{transform:translateY(2px) scale(.995);}
  .btn:disabled{opacity:.45;filter:grayscale(.3);cursor:not-allowed;transform:none;}
  .btn.coral{background:var(--coral);color:#fff;}
  .btn.teal{background:var(--teal);color:#08312d;}
  .btn.ochre{background:var(--ochre);color:#3a2c06;}
  .btn.ghost{background:transparent;color:var(--ink);border:2px solid var(--line);box-shadow:none;}
  .btn.sm{width:auto;padding:9px 14px;font-size:13px;border-radius:11px;}
  .btn-row{display:flex;gap:10px;}
  .btn-row .btn{flex:1;}
  :focus-visible{outline:3px solid var(--coral);outline-offset:2px;border-radius:6px;}

  /* ---------- setup ---------- */
  .count-row{display:flex;align-items:center;gap:12px;margin:8px 0 4px;}
  .stepper{display:flex;align-items:center;gap:0;border:1.5px solid var(--line);border-radius:12px;overflow:hidden;background:var(--paper-2);}
  .stepper button{width:46px;height:46px;border:none;background:transparent;font-size:24px;font-weight:800;color:var(--ink);line-height:1;}
  .stepper button:active{background:var(--line-soft);}
  .stepper .val{width:50px;text-align:center;font-size:22px;font-weight:900;}
  .count-lbl{font-size:13px;color:#4a6c75;font-weight:700;}

  .player-input{display:flex;align-items:center;gap:10px;margin:8px 0;}
  .dot{width:18px;height:18px;border-radius:50%;flex:0 0 auto;border:2px solid #fff;box-shadow:0 0 0 1.5px rgba(0,0,0,.12);}
  .player-input input{
    flex:1;font-family:inherit;font-size:15px;font-weight:600;color:var(--ink);
    padding:11px 12px;border:1.5px solid var(--line);border-radius:11px;background:var(--paper-2);
    min-width:0;
  }
  .player-input input:focus{border-color:var(--petrol);background:#fff;}

  /* ---------- splash ---------- */
  .splash{
    position:fixed;inset:0;z-index:80;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
    background:radial-gradient(120% 90% at 50% 30%, #FBF4DF 0%, var(--cream) 55%, #E8DBBE 100%);
    cursor:pointer;padding:24px;text-align:center;transition:transform .12s ease;-webkit-tap-highlight-color:transparent;
  }
  .splash:active{transform:scale(.992);}
  .splash.leaving{animation:splashOut .2s ease forwards;}
  @keyframes splashOut{to{opacity:0;transform:scale(.96);}}
  .splash .logo-eye{width:96px;height:96px;border-radius:50%;background:var(--paper-2);border:5px solid var(--ink);position:relative;box-shadow:var(--shadow-lg);animation:eyePop .6s ease;}
  .splash .logo-eye::before{content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:42px;height:42px;border-radius:50%;background:radial-gradient(circle at 38% 35%, #5fb6c2 0 30%, var(--petrol) 55%, var(--ink) 100%);}
  .splash .logo-eye::after{content:"";position:absolute;top:34px;left:34px;width:13px;height:13px;border-radius:50%;background:#fff;}
  .splash h1{font-size:54px;font-weight:900;letter-spacing:-3px;margin:6px 0 0;color:var(--ink);text-shadow:3px 3px 0 rgba(224,121,94,.28);animation:eyePop .6s ease .1s both;}
  .splash .tag{font-family:var(--serif);font-style:italic;color:var(--petrol);font-size:15px;animation:fadeUp .6s ease .25s both;}
  .splash .hint{position:absolute;bottom:30px;font-size:12px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--petrol);
    background:rgba(255,255,255,.7);border:2px solid var(--petrol);border-radius:999px;padding:9px 18px;box-shadow:var(--shadow-lg);
    animation:fadeUp .6s ease .35s both, hintBob 1.8s ease-in-out .9s infinite;}
  @keyframes hintBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
  @keyframes eyePop{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
  @keyframes fadeUp{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
  @keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}

  /* ---------- tutorial ---------- */
  .tut-card{min-height:62vh;display:flex;flex-direction:column;}
  .tut-illus{font-size:72px;text-align:center;margin:18px 0 6px;line-height:1;}
  .tut-step{font-size:11px;font-weight:900;letter-spacing:1.4px;text-transform:uppercase;color:var(--coral);text-align:center;}
  .tut-ttl{font-size:26px;font-weight:900;letter-spacing:-.5px;text-align:center;margin:6px 12px 0;line-height:1.05;}
  .tut-txt{font-size:15px;color:#4a5c61;text-align:center;margin:10px 16px 0;line-height:1.5;}
  .tut-dots{display:flex;gap:7px;justify-content:center;margin:18px 0 14px;}
  .tut-dots i{width:9px;height:9px;border-radius:50%;background:var(--line);transition:all .2s;}
  .tut-dots i.on{background:var(--coral);width:22px;border-radius:999px;}
  .tut-nav{display:flex;gap:10px;margin-top:auto;}
  .tut-nav .btn{flex:1;}

  /* ---------- avatar ---------- */
  .av{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:900;
      background-size:cover;background-position:center;border:2px solid #fff;box-shadow:0 0 0 1.5px rgba(0,0,0,.12);
      flex:0 0 auto;vertical-align:middle;line-height:1;text-transform:uppercase;}
  .player-row{display:flex;align-items:center;gap:11px;margin:10px 0;}
  .av-up{position:relative;flex:0 0 auto;cursor:pointer;display:inline-flex;}
  .av-up .av{width:46px;height:46px;font-size:20px;}
  .av-cam{position:absolute;right:-3px;bottom:-3px;width:20px;height:20px;border-radius:50%;background:var(--ochre);
      border:2px solid var(--paper);display:grid;place-items:center;font-size:9px;line-height:1;}
  .player-row .pname{flex:1;font-family:inherit;font-size:15.5px;font-weight:600;color:var(--ink);
      padding:12px;border:1.5px solid var(--line);border-radius:11px;background:var(--paper-2);min-width:0;}
  .player-row .pname:focus{border-color:var(--petrol);background:#fff;}
  .master-badge{flex:0 0 auto;font-size:10px;font-weight:900;letter-spacing:.7px;text-transform:uppercase;background:var(--ochre);color:#3a2c06;border:1.5px solid #caa02f;border-radius:999px;padding:5px 8px;}

  /* ---------- hero card + category options ---------- */
  .card.hero{border:2px solid var(--petrol);box-shadow:var(--shadow-lg);}
  .card.hero h2{color:var(--petrol);}
  .counter-inline{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:2px 0 6px;padding-bottom:12px;border-bottom:1px dashed var(--line-soft);}
  .counter-inline .lbl{font-size:13px;font-weight:800;color:var(--ink);}
  .counter-inline .count-lbl{font-size:11px;color:#7a6f55;display:block;font-weight:600;}
  .catmode{display:flex;flex-direction:column;gap:9px;margin-top:6px;}
  .catmode button{width:100%;text-align:left;display:flex;flex-direction:column;gap:1px;
      border:1.5px solid var(--line);border-radius:13px;padding:12px 14px;background:var(--paper-2);color:var(--ink);}
  .catmode button b{font-size:14.5px;}
  .catmode button span{font-size:12px;color:#6c7d82;}
  .catmode button.on{border-color:var(--teal);background:#e3f1ee;box-shadow:inset 0 0 0 1.5px var(--teal);}

  /* ---------- question card ---------- */
  .qcard{
    background:linear-gradient(165deg,#fff 0%,var(--paper-2) 100%);
    border:2px solid var(--ink);border-radius:18px;padding:18px 16px;text-align:center;
    box-shadow:var(--shadow-lg);position:relative;
  }
  .qcat{
    display:inline-block;font-size:11px;font-weight:900;letter-spacing:1px;text-transform:uppercase;
    color:#fff;background:var(--petrol);padding:5px 12px;border-radius:999px;margin-bottom:12px;
  }
  .qtext{font-size:26px;font-weight:800;letter-spacing:-.4px;line-height:1.22;margin:4px 6px;}
  .wr-stat.urgent{color:var(--coral);animation:tickPulse .6s ease infinite;font-weight:900;}
  .qhint{font-size:12px;color:#7a6f55;margin-top:10px;font-style:italic;font-family:var(--serif);}
  .scale-badge{display:inline-block;background:var(--ochre);border:2px solid #caa02f;border-radius:10px;
    padding:8px 14px;font-size:13px;font-weight:800;color:#3a2c06;margin:8px 0 4px;animation:tickPulse 1.4s ease 3;}

  /* ---------- timer ---------- */
  .timer-wrap{text-align:center;margin:14px 0 6px;}
  .timer-num{font-size:54px;font-weight:900;letter-spacing:-2px;color:var(--ink);line-height:1;font-variant-numeric:tabular-nums;}
  .timer-num.warn{color:var(--coral);animation:tickPulse 1s ease infinite;}
  @keyframes tickPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.14)}}
  /* ---- animazioni momenti chiave ---- */
  .res-in{animation:rowIn .4s cubic-bezier(.2,1.2,.4,1) both;}
  @keyframes rowIn{from{opacity:0;transform:translateY(10px) scale(.97)}to{opacity:1;transform:none}}
  .ans-pop{animation:ansPop .55s cubic-bezier(.2,1.5,.4,1) both;}
  @keyframes ansPop{0%{opacity:0;transform:scale(.4)}70%{transform:scale(1.12)}100%{opacity:1;transform:scale(1)}}
  .cell.just{box-shadow:0 0 0 2.5px var(--coral);animation:cellPing .9s ease 2;}
  @keyframes cellPing{0%,100%{transform:scale(1)}50%{transform:scale(1.09)}}
  .pawn.drop{animation:pawnDrop .5s cubic-bezier(.2,1.4,.4,1) both;}
  .pawn.hop{animation:pawnHop .32s cubic-bezier(.3,1.5,.4,1) both;}
  @keyframes pawnHop{0%{transform:translateY(0) scale(1)}40%{transform:translateY(-11px) scale(1.14)}100%{transform:translateY(0) scale(1)}}
  @keyframes pawnDrop{from{transform:translateY(-9px) scale(.6);opacity:0}to{transform:none;opacity:1}}
  .trophy-pop{animation:ansPop .7s cubic-bezier(.2,1.5,.4,1) both;}
  .confetti{position:fixed;inset:0;pointer-events:none;z-index:70;overflow:hidden;}
  .confetti i{position:absolute;top:-12px;width:8px;height:13px;border-radius:2px;opacity:.95;
    animation:confFall linear both;}
  @keyframes confFall{0%{transform:translateY(-4vh) rotate(0)}100%{transform:translateY(106vh) rotate(560deg);opacity:.7}}
  .vs-row{display:flex;align-items:center;justify-content:center;gap:12px;margin:14px 0 4px;flex-wrap:wrap;}
  .vs-side{display:flex;flex-direction:column;align-items:center;gap:6px;font-size:14px;background:var(--paper-2);
    border:2.5px solid var(--pc,var(--ink));border-radius:14px;padding:12px 16px;min-width:96px;animation:rowIn .45s cubic-bezier(.2,1.3,.4,1) both;}
  .vs-badge{font-size:24px;font-weight:900;color:var(--coral);animation:tickPulse 1s ease infinite;letter-spacing:1px;}
  .ncc-letter{font-size:72px;font-weight:900;line-height:1;color:var(--petrol);letter-spacing:-2px;margin:8px 0 2px;}
  .ncc-cat{display:inline-block;font-weight:900;font-size:15px;background:var(--ochre);border-radius:999px;padding:7px 16px;color:#3a2c06;}
  .timer-lbl{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#7a6f55;}
  .tbar{height:9px;border-radius:999px;background:var(--line-soft);overflow:hidden;margin-top:10px;}
  .tbar > i{display:block;height:100%;width:100%;background:linear-gradient(90deg,var(--teal),var(--ochre),var(--coral));transition:width 1s linear;}

  /* ---------- roster "scrivete ora" + penne giù ---------- */
  .write-roster{border-top:1px dashed var(--line-soft);}
  .write-row{display:flex;align-items:center;gap:9px;padding:10px 2px;border-bottom:1px dashed var(--line-soft);}
  .write-row .wr-nm{flex:1;font-weight:800;font-size:14.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .wr-stat{font-weight:900;font-size:15px;font-variant-numeric:tabular-nums;color:var(--petrol);min-width:74px;text-align:right;}
  .wr-stat.reduced{color:var(--coral);}
  .wr-stat.down{color:#fff;background:var(--coral);padding:4px 10px;border-radius:999px;font-size:11.5px;letter-spacing:.4px;min-width:0;}
  .pensgiu{padding:32px 16px;}
  .pg-ic{font-size:64px;line-height:1;animation:pgpop .35s ease;}
  .pg-ttl{font-size:42px;font-weight:900;letter-spacing:-2px;color:var(--ink);margin-top:4px;}
  @keyframes pgpop{0%{transform:scale(.4);opacity:0}70%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}

  /* ---------- answer rows ---------- */
  .ans-row{display:flex;align-items:center;gap:9px;margin:9px 0;}
  .ans-name{display:flex;align-items:center;gap:7px;width:108px;flex:0 0 auto;font-weight:800;font-size:13.5px;}
  .ans-name .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .ans-row input{
    flex:1;font-family:inherit;font-size:18px;font-weight:800;color:var(--ink);text-align:right;
    padding:11px 12px;border:1.5px solid var(--line);border-radius:11px;background:var(--paper-2);min-width:0;
  }
  .ans-row input:focus{border-color:var(--petrol);background:#fff;}
  .ans-row input:disabled{background:#efe7d2;opacity:.7;}
  .mini-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:2px;}
  .tag{font-size:9.5px;font-weight:800;padding:2px 6px;border-radius:999px;letter-spacing:.2px;}
  .tag.malus{background:#fbe0d8;color:#a23a22;}
  .tag.bonus{background:#dff0d6;color:#3f6b22;}
  .tag.crown{background:var(--ochre);color:#3a2c06;}

  /* ---------- reveal / results ---------- */
  .answer-reveal{text-align:center;margin:6px 0 14px;}
  .answer-reveal .lbl{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#7a6f55;}
  .answer-reveal .big{font-size:40px;font-weight:900;letter-spacing:-1.5px;color:var(--coral);line-height:1.05;}
  .res-row{
    display:flex;align-items:center;gap:10px;padding:10px;border-radius:13px;margin:7px 0;
    background:var(--paper-2);border:1.5px solid var(--line-soft);
  }
  .res-row.podium{border-color:var(--ochre);background:#fdf3d9;}
  .rank{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-weight:900;font-size:14px;flex:0 0 auto;background:var(--line-soft);color:var(--ink);}
  .rank.r1{background:var(--ochre);color:#3a2c06;}
  .rank.r2{background:#cfd6d8;color:#2b3d42;}
  .rank.r3{background:#e3b08a;color:#5a2e12;}
  .res-mid{flex:1;min-width:0;}
  .res-mid .nm{font-weight:800;font-size:14px;}
  .res-mid .meta{font-size:11.5px;color:#6c7d82;}
  .res-pts{font-weight:900;font-size:16px;color:var(--teal);white-space:nowrap;}
  .res-pts.zero{color:#a8a08a;}

  /* ---------- board ---------- */
  .board{
    position:relative;display:flex;flex-direction:column;gap:8px;margin-top:8px;padding:4px 2px 6px 28px;
  }
  .board::before{content:"";position:absolute;left:15px;top:20px;bottom:22px;width:4px;border-radius:999px;background:linear-gradient(var(--teal),var(--ochre),var(--coral),var(--ink));opacity:.38;}
  .cell{

function unitHint(q, small){
  if(!q || !q.u) return small? `<div style="height:6px"></div>` : "";

}
function beep(f,ms){try{const ac=window._ac||(window._ac=new (window.AudioContext||window.webkitAudioContext)());
  const o=ac.createOscillator(),g=ac.createGain();o.frequency.value=f;o.connect(g);g.connect(ac.destination);
  g.gain.value=.18;o.start();setTimeout(()=>o.stop(),ms);if(navigator.vibrate)navigator.vibrate(35);}catch(e){}}

/* ---- Dado: facce a pallini + mini animazione di lancio ---- */
function dieFaceHTML(v){
  const map={1:[4],2:[0,8],3:[0,4,8],4:[0,2,6,8],5:[0,2,4,6,8],6:[0,2,3,5,6,8]};
  const on=new Set(map[v]||[]);
  let s=""; for(let i=0;i<9;i++) s+=`<i class="pip${on.has(i)?" on":""}"></i>`;
  return s;
}
// fa "rotolare" il dado: cicla le facce rallentando, poi atterra sul valore finale
function spinDie(el, finalVal, pips, done){
  if(!el) { if(done) done(); return; }
  el.classList.add("spinning");
  const steps=[60,70,85,105,135,175,230]; let k=0;
  (function tick(){
    const f=1+rnd(6);
    el.innerHTML = pips ? dieFaceHTML(f) : String(f);
    if(k<steps.length){ setTimeout(tick, steps[k++]); }
    else{
      el.classList.remove("spinning");
      el.innerHTML = pips ? dieFaceHTML(finalVal) : String(finalVal);
      el.classList.add("landed");
      if(navigator.vibrate){ try{ navigator.vibrate(18); }catch(e){} }
      setTimeout(()=>el.classList.remove("landed"), 430);
      if(done) done();
    }
  })();
}

}

  if(menuBtn) menuBtn.hidden = (S.phase==="setup" || S.phase==="splash" || S.phase==="tutorial");
  if(S.phase==="setup"){ statusbar.innerHTML=""; return; }
  const fen = S.players.find(p=>p.fenomeno);
  let html = `<span class="pill live">Round ${S.round}/${MAX_ROUNDS}</span>`;
  const leader = S.players.slice().sort((a,b)=> b.score-a.score || b.pos-a.pos)[0];
  if(leader) html += `<span class="pill">🥇 ${esc(leader.name)} · ${leader.score} pt</span>`;
  if(fen) html += `<span class="pill fen">👑 Fenomeno: ${esc(fen.name)}</span>`;
  statusbar.innerHTML = html;
}

function initialOf(name){ const t=(name||"").trim(); return t? t.charAt(0).toUpperCase() : "?"; }
function avatarHTML(p, size){
  size = size||30;
  if(p.avatar){
    return `<span class="av" style="width:${size}px;height:${size}px;background-image:url('${p.avatar}')"></span>`;

  return `<span class="av" style="width:${size}px;height:${size}px;background:${p.color};font-size:${Math.round(size*0.44)}px">${esc(initialOf(p.name))}</span>`;
}

/* =====================================================================
   PESCA DOMANDA (anti-ripetizione + scelta categoria)
   ===================================================================== */
function drawQuestion(){
  S.round++;
  S.phase="draw";
  S.ranking=[]; S.roundWinnerId=null; S.special=null; S.specialQueue=[]; S.lastLanded=[];

  // "Cibo e Calorie" forza la categoria e salta la scelta
  if(S.forcedCat){
    const cat = S.forcedCat; S.forcedCat=null;
    return finalizeDraw(cat);
  }
  // chi sceglie? prima il bonus "Categoria preferita", poi la modalità a turno
  const catprefHolder = S.players.find(p=>p.bonus.some(b=>b.id==="catpref"));
  if(catprefHolder) return renderCategoryPick(catprefHolder, "bonus");
  if(S.catMode==="turno"){
    const chooser = S.players[(S.round-1) % S.players.length];
    return renderCategoryPick(chooser, "turno");
  }
  finalizeDraw(null);
}

// pesca una domanda mai uscita; quando l'ambito si esaurisce, si riparte
const USED_EVER = new Set(); // domande già uscite in QUESTA sessione (tra più partite)
function drawFromPool(cat){
  const pool = cat ? QUESTIONS.filter(q=>q.cat===cat) : QUESTIONS.filter(q=>!OFFCATS.has(q.cat));
  // prima scelta: mai uscita né in questa partita né nelle precedenti
  let avail = pool.filter(q=>!S.used.has(q) && !USED_EVER.has(q.q));
  // se la sessione ha esaurito l'ambito: accetta ripetizioni tra partite, mai nella stessa
  if(avail.length===0) avail = pool.filter(q=>!S.used.has(q));
  if(avail.length===0){
    pool.forEach(q=>S.used.delete(q));   // azzera solo questo ambito
    avail = pool.slice();
  }
  const q = pick(avail);
  S.used.add(q); USED_EVER.add(q.q);
  return q;
}

function finalizeDraw(cat){
  S.phase="draw";
  S.chosenCat = cat;
  S.question = drawFromPool(cat);
  renderStatus();
  startWriting();
}

/* =====================================================================

   ===================================================================== */
function playerLimit(p){
  // tempo personale: 20s, ridotto dai malus a tempo (Copione 10, Risposta lampo 5)
  return p.malus.reduce((m,x)=> x.time? Math.min(m,x.time):m, 25);
}
function startWriting(){
  S.phase="writing";
  S.timer.total=25; S.timer.left=25;
  if(ONLINE){
    ONLINE.est={};
    try{
      ONLINE.ws.send(JSON.stringify({
        t:"q",
        text:S.question.q,
        unit:S.question.u||"",
        cat:S.question.cat||"",
        round:S.round,
        seconds:S.timer.total,
        deadline:Date.now()+S.timer.total*1000
      }));
    }catch(e){}
  }
  renderWriting();
  startTimer();
}

  }).join("");

  app.innerHTML = `
    <div class="card">
      <p class="eyebrow">Round ${S.round} · ${esc(q.cat)}</p>
      <div style="font-size:15.5px;font-weight:800;line-height:1.25;margin-bottom:2px">${esc(q.q)}</div>

function checkAllEstimates(){
  if(S.phase!=="writing" || !ONLINE) return;
  const all = S.players.every(p=> ONLINE.est[(p.name||"").trim().toLowerCase()]!=null);
  if(all){ stopTimer(); pensGiu(); }
}

function startTimer(){
  stopTimer();
  updateTimerUI();
  updateWriteRoster();
  S.timer.id = track(setInterval(()=>{
    S.timer.left--;
    updateTimerUI();
    updateWriteRoster();
    if(S.timer.left<=0){ stopTimer(); pensGiu(); }
  },1000));
}
function stopTimer(){ if(S.timer.id){clearInterval(S.timer.id); S.timer.id=null;} }
// registro intervalli attivi (timer scrittura + mini-giochi), per fermarli su esci/ricomincia
const ACTIVE_INTERVALS=[];
function track(id){ ACTIVE_INTERVALS.push(id); return id; }
function haltAll(){ ACTIVE_INTERVALS.forEach(clearInterval); ACTIVE_INTERVALS.length=0; stopTimer(); }
function updateTimerUI(){
  const tnum=$("#tnum"), tbar=$("#tbar");
  if(!tnum) return;
  tnum.textContent = Math.max(0,S.timer.left);
  tnum.classList.toggle("warn", S.timer.left<=5);
  if(tbar) tbar.style.width = (Math.max(0,S.timer.left)/S.timer.total*100)+"%";
}
// stato per giocatore: secondi personali rimasti oppure "PENNA GIÙ"
function updateWriteRoster(){
  const elapsed = S.timer.total - S.timer.left;
  S.players.forEach((p,i)=>{
    const cell=$("#ws"+i); if(!cell) return;
    const key=(p.name||"").trim().toLowerCase();
    if(ONLINE && ONLINE.est[key]!=null){ cell.textContent="INVIATA ✓"; cell.classList.add("down"); cell.classList.remove("urgent","reduced"); return; }
    const personal = Math.max(0, playerLimit(p) - elapsed);
    if(personal<=0){
      if(!cell.classList.contains("down")){ cell.textContent="PENNA GIÙ ✋"; cell.classList.add("down"); cell.classList.remove("urgent"); if(playerLimit(p)<25) beep(300,180); }
    } else {
      cell.textContent = personal+"s";
      const limited = playerLimit(p)<25;
      cell.classList.toggle("urgent", limited && personal<=3);
      if(limited && personal<=3 && p._lastTick!==personal){ p._lastTick=personal; beep(760,55); }
    }
  });
}

  if(S.phase==="pensgiu" || S.phase==="input") return;
  if(ONLINE && ONLINE.ws){ try{ONLINE.ws.send(JSON.stringify({t:"lock"}))}catch(e){} }
  S.phase="pensgiu";

function parseEstimate(raw){
  if(raw===null||raw===undefined) return NaN;
  let s = String(raw).trim().replace(/\s/g,"").replace(/\.(?=\d{3}\b)/g,"").replace(",",".");
  if(s==="") return NaN;
  const v = parseFloat(s);
  return Number.isFinite(v)? v : NaN;
}

function calcResults(){
  if(S.phase!=="input") return; // evita doppie chiamate
  const q=S.question;
  // raccogli stime
  const entries = S.players.map((p,i)=>{
    let val = parseEstimate($("#ans"+i)? $("#ans"+i).value : "");
    // malus "A spanne, genio": arrotonda alla decina
    if(!Number.isNaN(val) && p.malus.some(m=>m.round10)){
      val = Math.round(val/10)*10;
    }
    let dist = Number.isNaN(val)? Infinity : Math.abs(q.a - val);
    // malus "Zavorra": la distanza pesa di più (anti-sapientone)
    if(dist!==Infinity){
      const pen = p.malus.reduce((f,m)=> m.penalty? f*m.penalty : f, 1);
      dist = dist*pen;
    }
    return {id:p.id, name:p.name, color:p.color, est:val, dist};
  });

  // ordina per distanza (Infinity = nessuna stima, in fondo)
  const ordered = entries.slice().sort((a,b)=> a.dist===b.dist?0:(a.dist<b.dist?-1:1));

  // individua i cluster di parità (stessa distanza finita) che toccano il podio (primi 3 validi)
  const clusters=[]; let i=0, validIdx=0;
  while(i<ordered.length){
    let j=i;
    while(j+1<ordered.length && ordered[j+1].dist===ordered[i].dist) j++;
    const size=j-i+1;
    if(size>1 && ordered[i].dist!==Infinity && validIdx<3){
      clusters.push({start:i, end:j});
    }
    if(ordered[i].dist!==Infinity) validIdx += size;
    i=j+1;
  }

  S.phase="rolloff";

  function finalize(){
    const duo = S.players.length===2;
    const pts = [3,2,1]; let valids=0;
    ordered.forEach((e,idx)=>{
      e.rank = idx+1;
      if(duo){
        // Duello: segna solo il più vicino — +2 se entro il 30% della risposta, +1 oltre
        const soglia = Math.abs(q.a)*0.30;
        e.pts = (idx===0 && e.dist!==Infinity)? (e.dist<=soglia? 2 : 1) : 0;
      } else {
        e.pts = (e.dist!==Infinity && valids<3)? pts[valids] : 0;
      }
      if(e.dist!==Infinity) valids++;
    });
    ordered.forEach(e=>{
      const p=pById(e.id);
      if(p && p.cecchino){
        if(e.dist===0){ e.pts=4; log(`🔭 COLPO DA CECCHINO! ${esc(p.name)} azzecca la risposta esatta: +4!`); }
        else log(`🔭 Cecchino mancato: ${esc(p.name)} non centra la risposta esatta.`);
        p.cecchino=false;
      }
    });
    S.ranking = ordered;
    const winner = ordered.find(e=>e.pts>0);
    if(duo && winner){
      const soglia=Math.abs(q.a)*0.30;
      log(winner.dist<=soglia? `🎯 Dentro il 30% (distanza ${fmtNum(winner.dist)}, soglia ${fmtNum(Math.round(soglia))}): +2.` : `Oltre il 30% (distanza ${fmtNum(winner.dist)}): solo +1.`);
    }
    S.roundWinnerId = winner? winner.id : null;
    if(winner){
      log(`Risposta: <b>${fmtNum(q.a)}${q.u?" "+q.u:""}</b>. Più vicino: <b>${esc(winner.name)}</b> (${fmtNum(winner.est)}).`);
    } else {
      log(`Risposta: <b>${fmtNum(q.a)}${q.u?" "+q.u:""}</b>. Nessuna stima valida questo round.`);
    }
    S.players.forEach(p=>{ p.voiceNext=false; p.malus = p.malus.filter(m=> m.sticky && p.fenomeno); }); // i malus normali si consumano; quelli della corona restano finché sei Fenomeno
    S.phase="reveal";
    renderReveal();
  }

  // risolve un cluster alla volta con la schermata Fotofinish interattiva
  function resolveCluster(k){
    if(k>=clusters.length) return finalize();
    const c=clusters[k];
    const slice = ordered.slice(c.start, c.end+1);
    const group = slice.map(e=>pById(e.id));
    diceOrder(group, {title:"Fotofinish!", sub:"Stessa distanza: sfida di spareggio"}, (orderedPlayers)=>{
      const byId={}; slice.forEach(e=> byId[e.id]=e);
      const newSlice = orderedPlayers.map(p=>byId[p.id]);
      for(let z=0; z<newSlice.length; z++) ordered[c.start+z]=newSlice[z];
      log(`🎲 Fotofinish: ${orderedPlayers.map(p=>esc(p.name)).join(" › ")}.`);
      resolveCluster(k+1);
    });
  }

  if(clusters.length===0) finalize();
  else resolveCluster(0);
}


function questionFunFact(q){
  if(q && q.f) return q.f;
  const text=(q&&q.q||"").toLowerCase();
  const answer=fmtNum(q.a)+(q.u?" "+q.u:"");
  if(text.includes("quanti minuti dura") || text.includes("quante ore")){
    return `⏱️ Piccola curiosità: durate e tempi possono cambiare leggermente tra edizioni, montaggi o rilevazioni. Nel gioco usiamo ${answer} come dato di riferimento.`;
  }
  if(text.includes("quanto è alto") || text.includes("quanti cm") || text.includes("metri è alto")){
    return `📏 Le misure dei personaggi famosi vengono spesso arrotondate. Qui il riferimento è ${answer}: abbastanza per far litigare almeno due biografie online.`;
  }
  if(text.includes("record") || (q&&q.cat)==="Record Assurdi"){
    return `🏆 I record cambiano quando qualcuno decide di superarli: per questa domanda il valore di riferimento è ${answer}. La parte più assurda è che qualcuno ha davvero pensato di misurarlo.`;
  }
  if((q&&q.cat)==="Cibo e Calorie"){
    return `🍽️ Calorie e pesi variano con ricetta e porzione. Il gioco usa ${answer} come valore medio: la scienza più pericolosa resta comunque “ne prendo solo un pezzetto”.`;
  }
  if((q&&q.cat)==="Spazio & Tempo" || (q&&q.cat)==="Scienza"){
    return `🔬 Questo dato nasce da misurazioni e stime scientifiche: il riferimento del round è ${answer}. In pratica, qualcuno ha fatto molti più calcoli di noi.`;
  }
  if((q&&q.cat)==="Cinema" || (q&&q.cat)==="Serie TV"){
    return `🎬 Il dato di riferimento è ${answer}. Tra versioni, tagli e speciali, però, il mondo dello spettacolo ama complicare anche i numeri semplici.`;
  }
  if((q&&q.cat)==="Musica"){
    return `🎵 Il valore corretto è ${answer}. Un numero preciso, cosa rara in un settore in cui perfino la durata di un brano può cambiare tra radio edit e album.`;
  }
  return `💡 Fun fact: il dato usato nel gioco è ${answer}. È il genere di informazione inutile finché non arriva esattamente questa domanda.`;
}

/* =====================================================================
   PUNTEGGIO + MOVIMENTO + FENOMENO
   ===================================================================== */
function applyScoringAndMove(){
  let finaleReached=null;
  S.lastLanded=[];
  // 🔥 Posta Doppia
  S.players.forEach(p=>{
    if(p.doubleNext){
      const e=S.ranking.find(r=>r.id===p.id);
      if(e && e.pts>0){ p.score+=e.pts; log(`🔥 Posta Doppia: ${esc(p.name)} raddoppia (+${e.pts} extra)!`); }
      else { p.score=Math.max(0,p.score-1); log(`🔥 Posta Doppia: ${esc(p.name)} resta fuori dal podio e perde 1 punto.`); }
      p.doubleNext=false;
    }
  });
  // 🤝 Gemelli
  if(S.twins){
    const ea=S.ranking.find(r=>r.id===S.twins.a), eb=S.ranking.find(r=>r.id===S.twins.b);
    if(ea&&eb&&ea.pts>0&&eb.pts>0){
      pById(S.twins.a).score++; pById(S.twins.b).score++;
      log(`🤝 Gemelli: doppio podio! +1 extra a testa.`);
    } else log(`🤝 Gemelli: patto fallito, nessun bonus.`);
    S.twins=null;
  }
  const movers=[];
  S.ranking.forEach(e=>{
    if(e.pts>0){
      const p = pById(e.id);
      const from = p.pos;
      p.score += e.pts;
      p.pos = Math.min(FINISH, p.pos + e.pts);
      movers.push({id:p.id, from, to:p.pos});
      S.lastLanded.push(p.pos);
      if(p.pos>=FINISH && !finaleReached) finaleReached=p;
    }
  });

  // streak / Fenomeno
  if(S.roundWinnerId){
    S.players.forEach(p=>{
      if(p.id===S.roundWinnerId){ p.streak = (S.lastWinnerId===p.id? p.streak:0)+1; }
      else p.streak=0;
    });
    const w = pById(S.roundWinnerId);
    let becameFenomeno=false;
    if(w.streak>=2 && !w.fenomeno){
      S.players.forEach(p=>{p.fenomeno=false; p.malus=p.malus.filter(x=>!x.sticky);});
      w.fenomeno=true;
      FENOMENO_MALUS.forEach(m=> w.malus.push(m));
      becameFenomeno=true;
      log(`👑 <b>${esc(w.name)}</b> vince due round di fila: diventa <b>Il Fenomeno</b>. Prezzo della fama: ✍️ "La Firma del Campione" (mano non dominante, 15s) e 👑 "Il Peso della Corona" (distanza +25%).`);
    }
    S.lastWinnerId = S.roundWinnerId;
    S._becameFenomeno = becameFenomeno;
  } else {
    S.lastWinnerId=null; S._becameFenomeno=false;
  }

  renderStatus();

  const afterMove = ()=>{
    if(finaleReached){
      log(`🏆 <b>${esc(finaleReached.name)}</b> raggiunge la casella ${FINISH}: FINALE!`);
      S.winnerFinal=finaleReached;
      return renderGameOver();
    }
    // ogni giocatore che ha segnato attiva la casella su cui si ferma (in ordine di podio)
    S.specialQueue = [];
    S.ranking.forEach(e=>{
      if(e.pts>0){
        const p = pById(e.id);
        const type = BOARD[p.pos-1]; // pos 1..FINISH -> index 0..FINISH-1
        if(type && type!=="domanda" && type!=="finale"){
          S.specialQueue.push({type, landerId:p.id, cell:p.pos});
        }
      }
    });
    nextSpecialOrPost();
  };
  return animateBoardMove(movers, afterMove);
}

function nextSpecialOrPost(){
  if(S.specialQueue && S.specialQueue.length){
    S.special = S.specialQueue.shift();
    return renderSpecial();
  }
  renderPostRound();
}

function wireSpecial(type, lander){

    const list=$("#bonusList");

      </button>`).join("");
    $$(".choice",list).forEach((btn)=>{
      btn.addEventListener("click",()=>{
        const b = opts[+btn.dataset.i];
        lander.bonus.push(b);
        log(`⭐ ${esc(lander.name)} tiene il bonus "${b.nm}".`);
        nextSpecialOrPost();
      });
    });

  else if(type==="voce"){
    $("#voiceGo").addEventListener("click",()=>{
      lander.voiceNext=true;
      log(`📢 ${esc(lander.name)} dovrà dire la prossima stima ad alta voce.`);
      nextSpecialOrPost();

function startTesi(challenger, opponent){
  const card = pick(TESI_CARDS);
  // ruoli assegnati a caso
  let tesiP, antiP;
  if(rnd(2)){ tesiP=challenger; antiP=opponent; } else { tesiP=opponent; antiP=challenger; }
  const tt=$("#tesiTargets"); if(tt) tt.classList.add("hide");
  const root=$("#tesiGame");
  let iv=null;

  function reading(){
    if(iv){clearInterval(iv);iv=null;}
    root.innerHTML = `
      <div class="card flat" style="background:var(--paper-2)">
        <div class="tesi-cat">${CAT_IC[card.cat]||"⚖️"} ${esc(card.cat)} · ${esc(card.tema)}</div>
        <div class="qcard" style="margin:8px 0"><div class="qtext" style="font-size:16px">${esc(card.prompt)}</div></div>
        <div class="tesi-roles">
          <div class="role tesi"><span class="role-lbl">TESI</span><b>${esc(tesiP.name)}</b><span>${esc(card.tesi)}</span></div>
          <div class="role anti"><span class="role-lbl">ANTITESI</span><b>${esc(antiP.name)}</b><span>${esc(card.antitesi)}</span></div>
        </div>
        <button type="button" class="btn ochre mt" id="tesiStart">Inizia · 20s a ${esc(tesiP.name)} →</button>
      </div>`;
    $("#tesiStart").addEventListener("click",()=>debate("tesi"));
  }

  function debate(side){
    if(iv){clearInterval(iv);iv=null;}
    const isTesi = side==="tesi";
    const who = isTesi? tesiP : antiP;
    const stance = isTesi? card.tesi : card.antitesi;
    root.innerHTML = `
      <div class="card flat" style="background:var(--paper-2)">
        <div class="tesi-cat">${esc(card.prompt)}</div>
        <div class="special-banner" style="padding:4px 0 2px">
          <div class="ttl" style="color:${isTesi?'var(--teal)':'var(--coral)'}">${isTesi?'TESI':'ANTITESI'}</div>
          <div class="sub" style="margin:0">tocca a <b>${esc(who.name)}</b></div>
        </div>
        <div class="qcard" style="margin:6px 0"><div class="qtext" style="font-size:15.5px">${esc(stance)}</div></div>
        <div class="timer-wrap" style="margin:8px 0 2px">
          <div class="timer-num" id="tNum">20</div><div class="timer-lbl">secondi per convincere</div>
          <div class="tbar"><i id="tBar"></i></div>
        </div>
        <button type="button" class="btn ghost sm" id="tSkip">${isTesi?"Passa all'Antitesi →":"Vai al voto →"}</button>
      </div>`;
    let left=20; const num=$("#tNum"), bar=$("#tBar");
    iv=track(setInterval(()=>{
      left--; if(num){num.textContent=Math.max(0,left); num.classList.toggle("warn",left<=5);} if(bar) bar.style.width=(Math.max(0,left)/20*100)+"%";
      if(left<=0) advance();
    },1000));
    function advance(){ if(iv){clearInterval(iv);iv=null;} isTesi? debate("anti") : vote(); }
    $("#tSkip").addEventListener("click",advance);
  }

  function vote(){
    if(iv){clearInterval(iv);iv=null;}
    root.innerHTML = `
      <div class="card flat" style="background:var(--paper-2)">
        <div class="tesi-cat">${esc(card.prompt)}</div>
        <p class="eyebrow center mt-s">Il tavolo vota: chi ha convinto di più?</p>
        <div class="choice-grid">
          <button type="button" class="btn teal" id="voteT">Vince la Tesi · ${esc(tesiP.name)}</button>
          <button type="button" class="btn coral" id="voteA">Vince l'Antitesi · ${esc(antiP.name)}</button>
          <button type="button" class="btn ghost" id="voteN">Nessuno convince</button>
        </div>
      </div>`;
    $("#voteT").addEventListener("click",()=>resolve(tesiP,"Tesi"));
    $("#voteA").addEventListener("click",()=>resolve(antiP,"Antitesi"));
    $("#voteN").addEventListener("click",()=>resolve(null));
  }

  function resolve(winner, sideName){
    if(winner){
      winner.score+=1; winner.pos=Math.min(FINISH,winner.pos+1);
      log(`⚖️ Tesi & Antitesi (${esc(card.tema)}): vince la ${sideName} di <b>${esc(winner.name)}</b>. +1 punto, +1 casella.`);
      renderStatus();
      if(winner.pos>=FINISH){ S.winnerFinal=winner; return renderGameOver(); }
    } else {
      log(`⚖️ Tesi & Antitesi (${esc(card.tema)}): nessuno convince. <b>Penitenza bipartisan</b>. 🤝`);
    }
    nextSpecialOrPost();
  }

  reading();
}

/* =====================================================================
   ROLL-OFF DADI — schermata dedicata: ognuno tocca il PROPRIO riquadro
   Usata da Fotofinish (parità) e Duello. Niente confusione su "di chi è il dado":
   ogni dado vive dentro il riquadro colorato del suo giocatore.
   ===================================================================== */
function diceOrder(players, opts, done){
  const result=[]; let remaining=players.slice();
  (function step(){
    if(remaining.length<=1){ if(remaining.length) result.push(remaining[0]); return done(result); }
    const place=result.length+1;
    diceRollWinner(remaining, {title:opts.title, sub:(opts.sub?opts.sub+" · ":"")+"in palio il "+place+"º posto"}, w=>{
      result.push(w); remaining=remaining.filter(p=>p.id!==w.id); step();
    });
  })();
}

  log(`🏁 Partita finita. Vince ${esc(champ.name)} con ${champ.score} punti.`);
  app.innerHTML = `
    <div class="confetti" aria-hidden="true">${Array.from({length:26},(_,i)=>`<i style="left:${(i*4+2)%100}%;background:${COLORS[i%COLORS.length]};animation-delay:${(i%9)*.14}s;animation-duration:${2.4+(i%5)*.35}s"></i>`).join("")}</div>

      <p class="tagline">ci è andato più vicino di tutti.</p>
    </div>
    <div class="card">
      <h2><span class="tick">📊</span> Classifica</h2>
      ${ranked.map((p,i)=>`
        <div class="score-row res-in" style="animation-delay:${.25+i*.14}s">
          <div class="rank ${i===0?'r1':i===1?'r2':i===2?'r3':''}">${i+1}</div>
          <div class="nm">${avatarHTML(p,26)}<span class="nmtxt">${esc(p.name)}</span>${p.fenomeno?" 👑":""}</div>

const prefersReducedMotion = ()=> window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
function animateBoardMove(movers, done){
  if(prefersReducedMotion() || !movers || movers.length===0 || document.hidden){ return done(); }
  S.phase="moving";
  const positions = {}; S.players.forEach(p=> positions[p.id]=p.pos);
  movers.forEach(m=> positions[m.id]=m.from);
  renderMoveBoard(positions);
  const maxSteps = Math.max(...movers.map(m=>m.to-m.from), 0);
  let step=0;
  function tick(){
    step++;
    let anyMoved=false;
    movers.forEach(m=>{ if(positions[m.id] < m.to){ positions[m.id]++; anyMoved=true; } });
    S.lastLanded = movers.filter(m=>positions[m.id]===m.to).map(m=>m.to);
    renderMoveBoard(positions, movers.map(m=>m.id));
    if(step<maxSteps && anyMoved){ setTimeout(tick, 220); }
    else{ setTimeout(done, 300); }
  }
  setTimeout(tick, 240);
}
function renderMoveBoard(positions, hoppingIds){
  const box = $("#moveBoard");
  const html = boardCard(positions, hoppingIds||[]);
  if(box){ box.outerHTML = html; }
  else{ app.innerHTML = `<div class="card"><p class="eyebrow">Round ${S.round} · Avanzamento</p></div>${html}`; }
}
function boardCard(positions, hoppingIds){
  const landed=new Set(S.lastLanded||[]);
  const hopSet=new Set(hoppingIds||[]);
  const posOf=(p)=> positions? (positions[p.id]!=null?positions[p.id]:p.pos) : p.pos;
  // 🎥 CAMERA: la mappa segue la corsa (stile Mario Party) invece di mostrare tutto in piccolo
  const maxPos=Math.max(0,...S.players.map(p=>posOf(p)));
  let lo=0, hi=BOARD.length, windowed=false;
  if(!S.mapFull && BOARD.length>12){
    hi=Math.min(BOARD.length, Math.max(9, maxPos+3));
    lo=Math.max(0, hi-9);
    windowed = !(lo===0 && hi===BOARD.length);
  }
  const behind=S.players.filter(p=>posOf(p)<lo).sort((a,b)=>b.pos-a.pos);
  const startHere=S.players.filter(p=>posOf(p)===0);
  const startPawns=startHere.map(p=>`<span class="pawn drop${hopSet.has(p.id)?' hop':''}" style="background:${p.color}" title="${esc(p.name)}">${esc(initialOf(p.name))}</span>`).join("");
  const startCell=`<div class="cell start-cell"><span class="n">0</span><span class="cell-main"><span class="ic">🚩</span><span class="cell-name">Partenza</span></span>${startPawns?`<span class="pawns">${startPawns}</span>`:"<span></span>"}</div>`;
  const cells = BOARD.map((type,i)=>{
    const n=i+1;
    if(n<lo || n>hi) return "";
    const here = S.players.filter(p=>posOf(p)===n);
    const pawns = here.map(p=>`<span class="pawn drop${hopSet.has(p.id)?' hop':''}" style="background:${p.color}" title="${esc(p.name)}">${esc(initialOf(p.name))}</span>`).join("");
    return `<div class="cell t-${type}${landed.has(n)?' just':''}" title="${CELL[type].nm}">
        <span class="n">${n}</span>
        <span class="cell-main"><span class="ic">${CELL[type].ic}</span><span class="cell-name">${esc(CELL[type].nm)}</span></span>
        ${pawns?`<span class="pawns">${pawns}</span>`:"<span></span>"}
      </div>`;
  }).join("");
  const behindHtml = behind.length
    ? `<div class="map-behind">↓ più indietro: ${behind.map(p=>`<span class="mb-chip"><i style="background:${p.color}">${esc(initialOf(p.name))}</i>cas. ${posOf(p)}</span>`).join("")}</div>` : "";
  const toggle = BOARD.length>12
    ? `<button type="button" class="map-toggle" id="mapToggle">${S.mapFull? "🎥 Segui la corsa" : "🗺️ Vedi tutta la mappa"}</button>` : "";
  const sub = windowed
    ? `Caselle ${lo}–${hi} di ${BOARD.length} · la mappa segue chi è in testa.`
    : `Dalla casella 0 fino alla Finale. Le pedine mostrano la posizione aggiornata di tutti.`;
  return `
    <div class="card" id="moveBoard">
      <h2><span class="tick">🗺️</span> Mappa di gioco</h2>
      <p class="sub">${sub}</p>
      ${behindHtml}
      <div class="board">${(lo===0?startCell:"")}${cells}</div>
      ${toggle}
    </div>`;
}

function onlineConnect(url, resume=false){
  url=(url||location.origin).trim().replace(/\/$/,"");
  const st=$("#onlineSt"); if(st) st.textContent=resume?"Riconnessione automatica…":"Connessione al server… (se dorme, sveglio in ~30s)";
  clearTimeout(ONLINE_RETRY);
  let ws;
  try{ ws=new WebSocket(url.replace(/^http/,"ws")); }
  catch(e){ if(st) st.textContent="⚠️ Apri il gioco in Safari: "+url+"/gioco"; return; }

  const previous=ONLINE;
  if(!ONLINE) ONLINE={ws:null,code:"",url,est:{},n:0,masterToken:"",connecting:true};
  ONLINE.ws=ws; ONLINE.url=url; ONLINE.connecting=true;

  ws.onerror=()=>{};
  ws.onopen=()=>{
    ONLINE.connecting=false;
    if(ONLINE.code && ONLINE.masterToken){
      ws.send(JSON.stringify({t:"resume_master",code:ONLINE.code,token:ONLINE.masterToken}));
    }else{
      ws.send(JSON.stringify({t:"create"}));
    }
  };
  ws.onmessage=e=>{ let m; try{m=JSON.parse(e.data)}catch(err){return;}
    if(m.t==="room"){
      ONLINE.code=m.code; ONLINE.masterToken=m.token||ONLINE.masterToken; ONLINE.n=m.n||0;
      try{localStorage.setItem("aocchio_master",JSON.stringify({code:ONLINE.code,token:ONLINE.masterToken,url:ONLINE.url}));}catch(e){}
      renderOnlineBar();
      if(!resume) log("🌐 Stanza lavagnette aperta: <b>"+m.code+"</b>",0);
    }
    else if(m.t==="resumed_master"){
      ONLINE.n=m.n||0; renderOnlineBar();
      const s2=$("#onlineSt"); if(s2) s2.textContent="Riconnesso ✓";
    }
    else if(m.t==="peer"){ ONLINE.n=m.n; renderOnlineBar(); }
    else if(m.t==="bye"){ ONLINE.n=m.n; renderOnlineBar(); }
    else if(m.t==="est"){ ONLINE.est[(m.name||"").trim().toLowerCase()]=m.value; renderOnlineBar(); updateWriteRoster(); checkAllEstimates(); }
    else if(m.t==="err"){ const s2=$("#onlineSt"); if(s2) s2.textContent="⚠️ "+m.msg; }
  };
  ws.onclose=()=>{
    if(!ONLINE || ONLINE.ws!==ws) return;
    ONLINE.connecting=true;
    renderOnlineBar();
    ONLINE_RETRY=setTimeout(()=>onlineConnect(ONLINE.url,true),1500);
  };
}

function onlineStartFreshRoom(){
  clearTimeout(ONLINE_RETRY);
  const old=ONLINE;
  if(old && old.ws){
    try{
      if(old.ws.readyState===WebSocket.OPEN){
        old.ws.send(JSON.stringify({t:"close_room"}));
      }
      old.ws.onclose=null;
      old.ws.close();
    }catch(e){}
  }
  try{ localStorage.removeItem("aocchio_master"); }catch(e){}
  ONLINE=null;
  setTimeout(()=>{
    if(/^https?:$/.test(location.protocol)) onlineConnect(location.origin,false);
  },250);
}

      <input type="url" id="onlineUrl" value="${/^https?:/.test(location.protocol)? location.origin : location.origin}" autocomplete="off"
        style="width:100%;box-sizing:border-box;font-size:13px;border:2px solid var(--ink);border-radius:10px;padding:8px;margin:6px 0 4px">
      <button type="button" class="btn teal sm" id="onlineBtn">Crea stanza →</button>
      <div style="font-size:10.5px;color:#8a7f63;margin-top:4px" id="onlineSt">I telefoni degli amici diventano lavagnette</div>`;
    const b=$("#onlineBtn"); if(b) b.addEventListener("click",()=>onlineConnect(($("#onlineUrl")&&$("#onlineUrl").value)||""));
  }
}
function onlineFill(){
  if(!ONLINE) return;
  $$(".ans-in").forEach(inp=>{
    const nm=(inp.dataset.pname||"").trim().toLowerCase();
    if(ONLINE.est[nm]!=null && inp.value==="") inp.value=ONLINE.est[nm];
  });
}
function initCatChips(){
  document.addEventListener("click", e=>{
    const chip=e.target.closest(".cat-chip"); if(!chip) return;
    const c=chip.dataset.cat;
    if(OFFCATS.has(c)) OFFCATS.delete(c);
    else { if(CATEGORIES.length-OFFCATS.size<=3){ chip.classList.add("shake"); setTimeout(()=>chip.classList.remove("shake"),300); return; } OFFCATS.add(c); }
    chip.classList.toggle("off", OFFCATS.has(c));
  });
}
function initButtonFeedback(){
  document.addEventListener("pointerdown", e=>{
    const btn=e.target.closest(".btn"); if(!btn) return;
    btn.classList.remove("pressed"); void btn.offsetWidth; btn.classList.add("pressed");
  });
}
function initMenu(){
  menuBtn.addEventListener("click",e=>{
    e.stopPropagation();
    const open = menuSheet.hidden;
    menuSheet.hidden = !open;
    menuBtn.setAttribute("aria-expanded", open ? "true" : "false");
  });
  document.addEventListener("click",e=>{
    if(!menuSheet.hidden && e.target!==menuBtn && !menuSheet.contains(e.target)) closeMenu();
  });
  $$(".menu-item", menuSheet).forEach(it=>{
    it.addEventListener("click",()=>{
      const act=it.dataset.act; closeMenu();
      if(act==="restart"){
        confirmAction("Ricominciare la partita da capo con gli stessi giocatori? I punteggi e le posizioni attuali andranno persi.", startGame);
      } else if(act==="home"){
        confirmAction("Uscire dalla partita e tornare alla Home? La partita in corso verrà chiusa.", ()=>{ onlineStartFreshRoom(); renderSetup(); });
      }
    });
  });
}

/* =====================================================================
   BOOT
   ===================================================================== */
syncPlayers();
initMenu();
initButtonFeedback();
initCatChips();

// Un solo servizio: il master crea automaticamente la stanza sullo stesso dominio.
if(/^https?:$/.test(location.protocol)){
  setTimeout(()=>{
    if(!ONLINE) onlineConnect(location.origin);
  }, 500);
}

let _errCount=0, _errLastRound=-1;
window.addEventListener("error",ev=>{
  try{
    if(!S || !S.players || !S.players.length || S.phase==="splash" || S.phase==="setup") return;
    if(document.getElementById("errRescue")) return;
    _errCount = (S.round===_errLastRound)? _errCount+1 : 1;
    _errLastRound = S.round;
    const div=document.createElement("div");
    div.id="errRescue";
    div.innerHTML=`<div class="card" style="position:fixed;left:12px;right:12px;bottom:14px;z-index:99;border:2px solid #e7b4a3;background:#fbe9e2;border-radius:14px;padding:10px 12px">
      <div style="font-size:12px;color:#6b2f1e"><b>⚠️ Intoppo tecnico, riprendo da solo…</b><br>${esc(String(ev.message||"errore sconosciuto")).slice(0,140)}</div></div>`;
    document.body.appendChild(div);
    setTimeout(()=>{
      div.remove(); haltAll();
      try{
        if(_errCount>=2){ log("⚠️ Round saltato per un errore tecnico."); drawQuestion(); }
        else renderPostRound();
      }catch(e){ try{ drawQuestion(); }catch(e2){ try{ renderSetup(); }catch(e3){} } }
    }, 1600);
  }catch(e){}
});
renderSplash();
</script>
